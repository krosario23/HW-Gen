<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homework Name Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
        }

        input[type="file"],
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #dcdfe6;
            font-size: 14px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        .row {
            margin: 15px auto;
            display: flex;
            gap: 16px;
        }

        .row > div {
            flex: 1;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #dcdfe6;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #4338ca;
        }

        .hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: -12px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Generate Homework Packets</h2>

        <form method="POST" enctype="multipart/form-data">
            
            <label>Upload PDF Template</label>
            <input type="file" name="pdf" required>

            <label>Student Names</label>
            <textarea name="names" rows="8" placeholder="Alice&#10;Bob&#10;Carlos"></textarea>
            <div class="hint">Enter one name per line</div>

            <div class="row">
                <div>
                    <label>Extra Copies</label>
                    <input type="number" name="extra_copies" min="1" value="1">
                </div>
            </div>

            <button type="submit">Generate PDF</button>
        </form>
    </div>
</body>
</html>
